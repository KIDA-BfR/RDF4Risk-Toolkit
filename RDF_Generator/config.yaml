# --- Unified Configuration for Linked Data Generation Toolbox ---

# --- General Settings ---
app_version: "PoC"
user_agent_template: "StreamlitReconciliationApp/{version}"
default_namespace: "https://fskx-graphdb.risk-ai-cloud.com/"



# --- RDF Generation Settings ---
rdf_format: "trig"
data_graph_uri: "https://fskx-graphdb.risk-ai-cloud.com/"
terms_graph_uri: "https://fskx-graphdb.risk-ai-cloud.com/voc/"

# --- Column Mappings (for RDF Generator) ---
id_column: "_generated_id_"
string_column: "Term"
iri_column: "URI"
rdf_role_column: "RDF Role"
match_type_column: "Match Type"

# --- Subject and Graph URIs (for RDF Generator) ---
instance_class_uri: ""
named_graph_uri: ""
subject_uri_base: ""
subject_column: ""

# --- Data Cleaning and Typing ---
uri_character_replacements:
  'Ö': 'Oe'
  'Ä': 'Ae'
  'Ü': 'Ue'
  'ö': 'oe'
  'ä': 'ae'
  'ü': 'ue'
  'ß': 'ss'
datatype_guessing:
  boolean_keywords: ['true', 'false', 'ja', 'nein', 'yes', 'no']
  year_keywords: ['jahr', 'year']

# --- Prefix Management ---
manual_prefixes:
  "http://snomed.info/id/": ["snomed", "sct"]

# --- Advanced Grouping and Templating (for RDF Generator) ---
group_config: {}
schema_templates: []
active_template_name: ""

# --- IRI Resolution (for automated script) ---
iri_resolution:
  enabled: true
  output_path: "input/resolved_mapping_table.csv"

# --- DCAT Catalog Metadata ---
dcat_metadata:
  enabled: true
  title: "My Dataset"
  description: "A description of my dataset."
  version: "1.0"
  creator: "John Doe"
  creator_email: "john.doe@example.com"
  publisher_name: "My Organization"
  publisher_uri: "https://example.org"
  license: "CC-BY-4.0"
  themes:
    - "science"
    - "health"

# --- Sentence Transformer Model (for Reconciliation) ---
cosine_model:
  name: 'all-MiniLM-L6-v2'

# --- API Specifications (for Reconciliation and URI Enrichment) ---
api_specs:

  bioportal:
    parser: "bioportal"
    base_url: "https://data.bioontology.org"
    lookup_endpoint: "/search"
    ui_template: "https://bioportal.bioontology.org/ontologies/{acronym}?p=classes&conceptid={encoded_iri}"
    params:
      require_exact_match: "true"
      include: "prefLabel,synonym,definition"
      pagesize: 15
    auth:
      required: true
      method: "header"
      header_name: "Authorization"
      template: "apikey token={key}"
      env_var: "BIOPORTAL_KEY"
    default_ontologies: "NCIT,MESH,SNOMEDCT,GO"

  ols:
    parser: "ols"
    base_url: "https://www.ebi.ac.uk/ols4"
    lookup_endpoint: "/api/search"
    ui_template: "https://www.ebi.ac.uk/ols4/ontologies/{acronym}/terms?iri={encoded_iri}"
    params:
      exact: "true"
      fieldList: "iri,label,synonym,description,ontology_prefix"
      queryFields: "label,synonym,description,short_form,obo_id,iri"
      rows: 15
    default_ontologies: "go,chebi,doid,hp,mondo"

  geonames:
    parser: "geonames"
    base_url: "https://secure.geonames.org"
    lookup_endpoint: "/searchJSON"
    auth:
      required: true
      method: "param"
      param_name: "username"
      env_var: "GEONAMES_USER"

  agrovoc:
    parser: "agrovoc"
    base_url: "https://agrovoc.fao.org/sparql"
    lookup_endpoint: "" # Endpoint is the base_url
    headers:
      Accept: "application/sparql-results+json"
    query_template:
      query: "ASK {{ <{iri}> ?p ?o }}"
      format: "json"

  ontobee:
    parser: "ontobee"
    base_url: "https://sparql.hegroup.org"
    lookup_endpoint: "/sparql"
    ui_template: "https://ontobee.org/ontology/{acronym}?iri={encoded_iri}"
    headers:
      Accept: "application/json"
    query_template:
      query: "ASK WHERE {{ <{iri}> ?p ?o }}"
      format: "json"
  
  wikidata:
    parser: "wikidata"
    base_url: "https://www.wikidata.org/w/api.php"
    lookup_endpoint: "" # Not used by custom parser logic
    
  ncbi:
    parser: "ncbi"
    base_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
    lookup_endpoint: "esearch.fcgi" # Example, will be handled by custom parser
    auth:
      required: false
      method: "param"
      param_name: "api_key"
      env_var: "NCBI_API_KEY"
    params:
      tool: "MyStreamlitReconTool"
      retmode: "json"
    default_databases: ['taxonomy', 'bioproject', 'gene']
    default_retmax: 10
